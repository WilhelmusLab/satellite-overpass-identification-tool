name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches:

concurrency:
  group: ci-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          SPACEUSER: ${{ vars.SPACEUSER }}
          SPACEPSWD: ${{ secrets.SPACEPSWD }}
        run: pytest
